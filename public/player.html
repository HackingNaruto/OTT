<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Secure Player</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; outline: none; }
body { font-family: 'Poppins', sans-serif; background: #000; height: 100vh; width: 100vw; margin: 0; padding: 0; display: flex; align-items: center; justify-content: center; user-select: none; -webkit-user-select: none; color: #fff; overflow: hidden; }
.main-wrapper { width: 100%; height: 100%; display: flex; flex-direction: column; }

.video-wrapper { position: relative; width: 100%; height: 100%; overflow: hidden; background: #000; display: flex; flex-direction: column; justify-content: center; }
.video-wrapper:fullscreen { aspect-ratio: auto; height: 100vh; border-radius: 0; }
video { width: 100%; height: 100%; display: block; object-fit: contain; pointer-events: none; }
audio { display: none; }
.glass-overlay { position: absolute; top:0; left:0; width:100%; height:100%; z-index: 5; user-select: none; -webkit-touch-callout: none; pointer-events: auto; }

/* Overlays & Controls */
.lock-btn { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.6); color: white; border: none; border-radius: 50%; width: 40px; height: 40px; font-size: 16px; cursor: pointer; z-index: 25; display: flex; align-items: center; justify-content: center; }
.loading-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: none; flex-direction: column; align-items: center; gap: 8px; z-index: 15; }
.spinner { width: 45px; height: 45px; border: 4px solid rgba(255, 46, 122, 0.3); border-top: 4px solid #ff2e7a; border-radius: 50%; animation: spin 1s linear infinite; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

.gesture-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(25, 25, 25, 0.7); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); padding: 15px 25px; border-radius: 50px; font-size: 16px; font-weight: bold; display: none; z-index: 10; pointer-events: none; box-shadow: 0 4px 15px rgba(0,0,0,0.5); align-items: center; justify-content: center; gap: 10px; white-space: nowrap; }
.center-icon { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.5); background: rgba(0, 0, 0, 0.6); color: white; border-radius: 50%; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; font-size: 24px; opacity: 0; pointer-events: none; z-index: 30; transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.2s; }
.center-icon.active { opacity: 1; transform: translate(-50%, -50%) scale(1.5); }
.custom-controls { position: absolute; bottom: 0; left: 0; width: 100%; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); padding: 10px; display: flex; flex-direction: column; gap: 8px; transition: opacity 0.3s; z-index: 99999; }
.progress-container { display: flex; align-items: center; gap: 8px; font-size: 11px; font-weight: 600; }
.slider-wrapper { position: relative; flex: 1; height: 16px; display: flex; align-items: center; cursor: pointer; }
.slider-track-bg { position: absolute; width: 100%; height: 3px; background: rgba(255,255,255,0.2); border-radius: 2px; }
.slider-progress { position: absolute; height: 3px; background: #ff2e7a; border-radius: 2px; width: 0%; pointer-events: none; }
.slider-wrapper input[type=range] { position: absolute; width: 100%; height: 100%; -webkit-appearance: none; background: transparent; cursor: pointer; z-index: 10; margin: 0; }
.slider-wrapper input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: #e50914; border-radius: 50%; cursor: pointer; transition: transform 0.1s; position: relative; z-index: 15; }
.slider-wrapper input[type=range]:active::-webkit-slider-thumb { transform: scale(1.3); }

.control-buttons { display: flex; justify-content: space-between; align-items: center; }
.control-buttons button { background: none; border: none; color: white; font-size: 16px; cursor: pointer; margin-right: 15px; transition: color 0.2s; }
.control-buttons button:hover { color: #ff2e7a; }
.volume-container { display: flex; align-items: center; position: relative; }
.volume-slider { width: 0; opacity: 0; transition: width 0.3s, opacity 0.3s; margin-left: -5px; margin-right: 15px; accent-color: #ff2e7a; cursor: pointer; }
.volume-container:hover .volume-slider, .volume-slider:focus { width: 60px; opacity: 1; }

/* Dynamic Watermark */
#watermark { position: absolute; color: rgba(255, 255, 255, 0.12); font-size: 14px; font-weight: bold; pointer-events: none; z-index: 2147483647 !important; user-select: none; transition: all 1s ease; display: block !important; }
.popup { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.85); justify-content: center; align-items: center; z-index: 999999; }
.hidden { display: none !important; }
.cursor-hidden { cursor: none !important; }
.popup-content { background: #1a1a1a; padding: 25px; border-radius: 15px; width: 85%; max-width: 320px; text-align: center; border: 1px solid #333; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
.popup-content h2 { color: #ff2e7a; font-size: 18px; margin-bottom: 15px; }
.popup-content button { width: 100%; margin: 5px 0; padding: 10px; border-radius: 8px; border: none; outline: none; background: #2a2a2a; color: white; font-weight: bold; font-size: 14px; cursor: pointer; transition: 0.2s; }
.popup-content button:hover { border: 1px solid #ff2e7a; }
</style>
</head>
<body>

<div class="main-wrapper">
    <div class="video-wrapper" id="vWrapper">
        <div id="watermark"></div>
        <button id="lockBtn" class="lock-btn hidden" onclick="toggleLock(event)"><i class="fas fa-lock-open"></i></button>
        
        <div id="gestureOverlay" class="gesture-overlay"></div>
        <div id="centerIcon" class="center-icon"></div>
        <div id="loadingOverlay" class="loading-overlay">
            <div class="spinner"></div>
            <div id="loadingText" style="font-size:12px; margin-top:5px; font-weight:bold;">Buffering... 0%</div>
        </div>
        
        <!-- Anti Download attributes -->
        <video id="myVideo" playsinline controlsList="nodownload noplaybackrate" crossorigin="anonymous"></video>
        <audio id="myAudio" crossorigin="anonymous"></audio>
        <div id="brightnessOverlay" style="position: absolute; top:0; left:0; width:100%; height:100%; background: black; opacity: 0; pointer-events: none; z-index: 4; transition: opacity 0.1s;"></div>
        <div id="glassOverlay" class="glass-overlay"></div>

        <div class="custom-controls" id="customControls">
            <div class="progress-container">
                <span id="currentTimeDisplay">00:00:00</span>
                <div class="slider-wrapper">
                    <div class="slider-track-bg"></div>
                    <div class="slider-buffer" id="bufferProgress" style="position: absolute; height: 3px; background: rgba(255,255,255,0.4); border-radius: 2px; width: 0%; pointer-events: none;"></div>
                    <div class="slider-progress" id="sliderProgress" style="z-index: 2;"></div>
                    <input type="range" id="progressBar" min="0" max="100" value="0">
                </div>
                <span id="totalTimeDisplay">00:00:00</span>
            </div>
            <div class="control-buttons">
                <div style="display: flex; align-items: center;">
                    <button onclick="togglePlay()" id="playBtn"><i class="fas fa-play"></i></button>
                    <div class="volume-container">
                        <button onclick="toggleMute()"><i class="fas fa-volume-up" id="muteIcon"></i></button>
                        <input type="range" id="desktopVolume" class="volume-slider" min="0" max="1" step="0.05" value="1">
                    </div>
                    <button onclick="toggleSpeedPopup()" id="speedBtn" title="Playback Speed"><i class="fas fa-tachometer-alt"></i></button>
                </div>
                <div>
                    <button onclick="openEpisodeDrawer()" id="episodesBtn" title="More Episodes" class="hidden"><i class="fas fa-list-ul"></i></button>
                    <button onclick="toggleQualityPopup()" id="qualityBtn" title="Video Quality" style="display: none;"><i class="fas fa-cog"></i></button>
                    <button onclick="toggleAudioPopup()" id="audioBtn" title="Audio Tracks" style="display: none;"><i class="fas fa-language"></i></button>
                    <button onclick="togglePiP()" title="Picture in Picture"><i class="fas fa-clone"></i></button>
                    <button onclick="cycleAspect()"><i class="fas fa-crop-alt"></i></button>
                    <button onclick="handleFullscreenClick()" style="margin-right: 0;"><i class="fas fa-expand"></i></button>
                </div>
            </div>
        </div>

        <div id="orientationPopup" class="popup" onclick="hideOrientationPopup()">
            <div class="popup-content" onclick="event.stopPropagation()">
                <h2>Screen Orientation</h2>
                <button onclick="enterFullScreen('landscape')"><i class="fas fa-mobile-alt" style="transform: rotate(90deg);"></i> Landscape</button>
                <button onclick="enterFullScreen('portrait')"><i class="fas fa-mobile-alt"></i> Portrait</button>
                <button style="background: #ff2e7a; margin-top: 8px;" onclick="hideOrientationPopup()">Cancel</button>
            </div>
        </div>

        <div id="qualityPopup" class="popup" onclick="toggleQualityPopup()">
            <div class="popup-content" style="max-width: 250px; padding: 20px;" onclick="event.stopPropagation()">
                <h2>Video Quality</h2>
                <div id="qualityList" style="display: flex; flex-direction: column; gap: 8px;"></div>
                <button style="background: #ff2e7a; margin-top: 15px;" onclick="toggleQualityPopup()">Close</button>
            </div>
        </div>

        <div id="audioPopup" class="popup" onclick="toggleAudioPopup()">
            <div class="popup-content" style="max-width: 250px; padding: 20px;" onclick="event.stopPropagation()">
                <h2>Audio Tracks</h2>
                <div id="audioList" style="display: flex; flex-direction: column; gap: 8px;"></div>
                <button style="background: #ff2e7a; margin-top: 15px;" onclick="toggleAudioPopup()">Close</button>
            </div>
        </div>

        <div id="speedPopup" class="popup" onclick="toggleSpeedPopup()">
            <div class="popup-content" style="max-width: 300px; padding: 20px;" onclick="event.stopPropagation()">
                <h2>Playback Speed</h2>
                <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px;">
                    <input type="range" id="speedSlider" min="0.25" max="3" step="0.05" value="1" style="flex: 1; margin-right: 15px; accent-color: #ff2e7a; cursor: pointer;">
                    <input type="number" id="speedInput" min="0.25" max="5" step="0.05" value="1" style="width: 60px; background: #2a2a2a; border: 1px solid #444; color: white; padding: 5px; border-radius: 5px; text-align: center; outline: none;">
                </div>
                <div style="display: flex; gap: 10px; margin-top: 5px;">
                    <button style="background: #ff2e7a; flex: 1;" onclick="applySpeedAndClose()">Set</button>
                    <button style="background: #ff2e7a; flex: 1;" onclick="toggleSpeedPopup()">Close</button>
                </div>
            </div>
        </div>

        <div id="resumePopup" class="popup" style="background: rgba(0,0,0,0.9);">
            <div class="popup-content" style="background: transparent; border: none; box-shadow: none;">
                <h2 style="color: white; font-size: 24px; margin-bottom: 20px;">Resume Playback?</h2>
                <button onclick="resumePlayback(true)" style="background: white; color: black; padding: 15px; font-size: 16px; border-radius: 50px; margin-bottom: 15px; display: flex; justify-content: center; align-items: center; gap: 10px;"><i class="fas fa-play"></i> Resume Playing</button>
                <button onclick="resumePlayback(false)" style="background: rgba(255,255,255,0.2); color: white; padding: 15px; font-size: 16px; border-radius: 50px; display: flex; justify-content: center; align-items: center; gap: 10px;"><i class="fas fa-redo"></i> Start Over</button>
            </div>
        </div>
        <div id="episodeDrawer" class="hidden" style="position: fixed; inset: 0; z-index: 9999999; background: transparent; display: flex; align-items: flex-end; pointer-events: none;" onclick="closeEpisodeDrawer()">
            <div id="episodeDrawerContent" style="background: rgba(10,10,10,0.95); backdrop-filter: blur(10px); width: 100%; border-radius: 20px 20px 0 0; padding: 20px; box-shadow: 0 -10px 40px rgba(0,0,0,0.8); transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); pointer-events: auto;" onclick="event.stopPropagation()">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <h2 style="color: white; font-size: 18px; margin: 0; font-weight: 600;">More Episodes</h2>
                    <button onclick="closeEpisodeDrawer()" style="background: none; border: none; color: white; font-size: 28px; cursor: pointer;">&times;</button>
                </div>
                <div id="episodeListContainer" style="display: flex; overflow-x: auto; gap: 15px; padding-bottom: 15px; scrollbar-width: none; -ms-overflow-style: none;">
                    <!-- Episodes injected here -->
                </div>
                <style>#episodeListContainer::-webkit-scrollbar { display: none; }</style>
            </div>
        </div>
    </div>
</div>

<script>
    // -----------------------------------------------------
    // 0. EPISODE DRAWER LOGIC
    // -----------------------------------------------------
    window.episodesData = [];
    window.addEventListener('message', (e) => {
        if (e.data && e.data.type === 'INIT_EPISODES') {
            window.episodesData = e.data.episodes;
            window.showThumbnails = e.data.showThumbnails !== false;
            window.enableAudioApi = e.data.enableAudioApi === true;
            buildEpisodeDrawer();
            
            if (window.enableAudioApi && typeof videoUrl !== 'undefined' && videoUrl) {
                fetchAudioTracks(videoUrl);
            }
        }
        if (e.data?.type === 'TOGGLE_PLAY') {
            const vid = document.getElementById('myVideo');
            if (vid) vid.paused ? vid.play() : vid.pause();
        }
    });

    function buildEpisodeDrawer() {
        const container = document.getElementById('episodeListContainer');
        container.innerHTML = '';
        if(!window.episodesData || window.episodesData.length === 0) return;
        
        window.episodesData.forEach((ep, idx) => {
            const card = document.createElement('div');
            card.style.cssText = 'flex: 0 0 auto; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); transition: 0.2s;';
            card.style.width = window.showThumbnails ? '140px' : 'auto';
            card.style.minWidth = window.showThumbnails ? '140px' : '150px';
            if (!window.showThumbnails) {
                card.style.display = 'flex';
                card.style.alignItems = 'center';
            }

            card.onclick = () => {
                window.parent.postMessage({ type: 'CHANGE_EPISODE', index: idx }, '*');
                closeEpisodeDrawer();
            };
            
            if (window.showThumbnails) {
                const imgContainer = document.createElement('div');
                imgContainer.style.cssText = 'width: 100%; aspect-ratio: 16/9; background: #000; position: relative;';
                
                const img = document.createElement('img');
                // Use the passed fallbackImg (which contains episode.thumbnail_url prioritized) or a default placeholder
                img.src = ep.fallbackImg || '/images/placeholder-landscape.png';
                img.style.cssText = 'width: 100%; height: 100%; object-fit: cover; border-radius: 6px;';
                img.onerror = function() {
                    this.onerror = null;
                    this.src = '/images/placeholder-landscape.png';
                };
                imgContainer.appendChild(img);
                card.appendChild(imgContainer);
            }
            
            const titleBox = document.createElement('div');
            titleBox.style.cssText = 'padding: 8px; flex-grow: 1;';
            titleBox.innerHTML = `<div style="font-size: 12px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px;">${ep.title}</div>
                                  <div style="font-size: 10px; color: #888;">S${ep.season} E${ep.episode}</div>`;
            
            if (!window.showThumbnails) {
                const playIcon = document.createElement('div');
                playIcon.innerHTML = '<i class="fas fa-play" style="color: #ff2e7a; font-size: 14px;"></i>';
                playIcon.style.cssText = 'padding: 0 12px; flex-shrink: 0; display: flex; align-items: center; justify-content: center;';
                card.appendChild(playIcon);
            }
            
            card.appendChild(titleBox);
            container.appendChild(card);
        });
    }

    function openEpisodeDrawer() {
        if(!window.episodesData || window.episodesData.length === 0) return;
        const drawer = document.getElementById('episodeDrawer');
        const content = document.getElementById('episodeDrawerContent');
        drawer.classList.remove('hidden');
        setTimeout(() => { content.style.transform = 'translateY(0)'; }, 10);
    }
    
    function closeEpisodeDrawer() {
        const drawer = document.getElementById('episodeDrawer');
        const content = document.getElementById('episodeDrawerContent');
        content.style.transform = 'translateY(100%)';
        setTimeout(() => { drawer.classList.add('hidden'); }, 300);
    }

    // -----------------------------------------------------
    // 1. INITIALIZATION & DYNAMIC URL FETCH
    // -----------------------------------------------------
    const params = new URLSearchParams(window.location.search);
    const videoId = params.get('id') || params.get('title');
    
    const deobfuscateUrl = (str) => {
        if (!str) return '';
        try {
            const noSalt = str.replace('SITE_SECURE_SALT', '');
            return atob(noSalt.split('').reverse().join(''));
        } catch (e) {
            return '';
        }
    };
    
    const videoUrl = deobfuscateUrl(params.get('data'));
    const qualitiesParam = params.get('qualities');
    let availableQualities = [];
    if (qualitiesParam) {
        try {
            availableQualities = JSON.parse(atob(qualitiesParam));
            if (availableQualities.length > 0) {
                document.getElementById('qualityBtn').style.display = 'inline-block';
                const qList = document.getElementById('qualityList');
                availableQualities.forEach(q => {
                    const btn = document.createElement('button');
                    btn.innerText = q.q;
                    btn.onclick = () => {
                        changeQuality(q.u);
                        toggleQualityPopup();
                    };
                    qList.appendChild(btn);
                });
            }
        } catch (e) { console.error('Quality parsing failed', e); }
    }

    const title = params.get('title') || 'External Stream';
    const wmText = params.get('wm_text') || '';
    const wmEnable = params.get('wm_enable') === 'true';
    const siteName = params.get('site_name') || 'Premium OTT';
    const wmMove = params.get('wm_move') || 'static';
    const wmSize = params.get('wm_size') || '14px';
    const wmPos = params.get('wm_pos') || 'bottom-right';
    
    const wmElement = document.getElementById('watermark');
    if (wmEnable && wmText) {
        wmElement.innerText = wmText;
        wmElement.style.cssText = `position: absolute !important; z-index: 999999 !important; pointer-events: none !important; white-space: nowrap !important; display: block !important; font-size: ${wmSize} !important; color: rgba(255,255,255,0.12) !important; font-weight: bold !important;`;

        if (wmMove === 'static') {
            const isDesktop = window.innerWidth > 1024;
            const vertOffset = isDesktop ? '10%' : '15px';
            
            if (wmPos === 'bottom-right') { wmElement.style.bottom = vertOffset; wmElement.style.right = '15px'; wmElement.style.top = 'auto'; wmElement.style.left = 'auto'; wmElement.style.transform = 'none'; }
            else if (wmPos === 'bottom-left') { wmElement.style.bottom = vertOffset; wmElement.style.left = '15px'; wmElement.style.top = 'auto'; wmElement.style.right = 'auto'; wmElement.style.transform = 'none'; }
            else if (wmPos === 'top-right') { wmElement.style.top = vertOffset; wmElement.style.right = '15px'; wmElement.style.bottom = 'auto'; wmElement.style.left = 'auto'; wmElement.style.transform = 'none'; }
            else if (wmPos === 'top-left') { wmElement.style.top = vertOffset; wmElement.style.left = '15px'; wmElement.style.bottom = 'auto'; wmElement.style.right = 'auto'; wmElement.style.transform = 'none'; }
            else if (wmPos === 'center-left') { wmElement.style.top = '50%'; wmElement.style.left = '5%'; wmElement.style.transform = 'translateY(-50%)'; wmElement.style.bottom = 'auto'; wmElement.style.right = 'auto'; }
            else if (wmPos === 'center-right') { wmElement.style.top = '50%'; wmElement.style.right = '5%'; wmElement.style.transform = 'translateY(-50%)'; wmElement.style.bottom = 'auto'; wmElement.style.left = 'auto'; }
        } else {
            window.wmInterval = setInterval(() => {
                wmElement.style.top = Math.floor(Math.random() * 80) + '%';
                wmElement.style.left = Math.floor(Math.random() * 80) + '%';
                wmElement.style.bottom = 'auto';
                wmElement.style.right = 'auto';
            }, 12000);
        }
    } else {
        wmElement.style.setProperty('display', 'none', 'important');
        wmElement.innerHTML = '';
        wmElement.style.opacity = '0';
    }

    const video = document.getElementById('myVideo');
    const glassOverlay = document.getElementById('glassOverlay');
    const vWrapper = document.getElementById('vWrapper');
    const customControls = document.getElementById('customControls');
    const lockBtn = document.getElementById('lockBtn');
    const overlay = document.getElementById('gestureOverlay');
    const centerIcon = document.getElementById('centerIcon');
    const loadingOverlay = document.getElementById('loadingOverlay');

    const resumePopup = document.getElementById('resumePopup');
    let savedTime = 0;
    if (videoId) {
        savedTime = parseFloat(localStorage.getItem('resume_' + videoId)) || 0;
    }

    if (videoUrl) {
        video.src = videoUrl;
        video.load();
        
        if (savedTime > 5) {
            resumePopup.style.display = 'flex';
        } else {
            video.play().catch(e => console.log("Autoplay blocked"));
        }
        
        setTimeout(() => { video.removeAttribute('src'); }, 1000);
    }
    
    video.addEventListener('play', () => {
        window.parent.postMessage({ type: 'PLAYER_STATE', isPlaying: true }, '*');
    });
    
    video.addEventListener('pause', () => {
        window.parent.postMessage({ type: 'PLAYER_STATE', isPlaying: false }, '*');
    });

    function resumePlayback(resume) {
        resumePopup.style.display = 'none';
        if (resume && savedTime > 0) {
            video.currentTime = savedTime;
        }
        video.play().catch(e => console.log("Autoplay blocked"));
    }

    // Save progress periodically
    setInterval(() => {
        if (!video.paused && video.currentTime > 5 && videoId) {
            localStorage.setItem('resume_' + videoId, video.currentTime);
        }
    }, 3000);

    // postMessage Listener for seamless quality hot-swap
    window.addEventListener('message', (e) => {
        if (e.data && e.data.type === 'switchQuality' && e.data.data) {
            let currTime = video.currentTime;
            let wasPaused = video.paused;
            video.src = deobfuscateUrl(e.data.data);
            video.currentTime = currTime;
            if (!wasPaused) video.play();
            setTimeout(() => { video.removeAttribute('src'); }, 1000);
            showOverlay('<i class="fas fa-check-circle text-green-500"></i> Quality Changed');
        }
    });

    // -----------------------------------------------------
    // 2.5 AUDIO API ENGINE (MKV TRACK DEMUXING)
    // -----------------------------------------------------
    const myAudio = document.getElementById('myAudio');
    let audioCtx = null;
    let gainNode = null;
    let isAudioEngineActive = false;

    async function fetchAudioTracks(url) {
        try {
            // Dynamically construct API URL by replacing direct path with /api/tracks/
            const urlObj = new URL(url);
            const apiUrl = url.replace(urlObj.pathname, '/api/tracks/');
            
            const res = await fetch(apiUrl);
            if (!res.ok) return;
            const data = await res.json();
            
            if (data && data.tracks && data.tracks.length > 1) {
                isAudioEngineActive = true;
                window.audioTracksData = data.tracks;
                document.getElementById('audioBtn').style.display = 'inline-block';
                const audioList = document.getElementById('audioList');
                audioList.innerHTML = '';
                
                data.tracks.forEach((track, idx) => {
                    const btn = document.createElement('button');
                    btn.innerText = track.name || `Track ${idx + 1} (${track.language || 'Unknown'})`;
                    btn.style.cssText = 'padding: 10px; background: #2a2a2a; border: 1px solid #444; border-radius: 5px; color: white; cursor: pointer; text-align: left; transition: 0.2s;';
                    btn.onmouseover = () => btn.style.background = '#ff2e7a';
                    btn.onmouseout = () => btn.style.background = '#2a2a2a';
                    btn.onclick = () => {
                        selectAudioTrack(track.stream_index || idx, urlObj.origin);
                        toggleAudioPopup();
                    };
                    audioList.appendChild(btn);
                });
                
                // Setup GainNode Hack
                setupAudioGainNode();
                
                // Auto-select first track
                selectAudioTrack(data.tracks[0].stream_index || 0, urlObj.origin);
            }
        } catch(e) {
            console.error("Audio API fetch failed", e);
        }
    }

    function toggleAudioPopup() {
        const popup = document.getElementById('audioPopup');
        popup.style.display = popup.style.display === 'flex' ? 'none' : 'flex';
    }

    function setupAudioGainNode() {
        if (audioCtx) return;
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioCtx.createMediaElementSource(myAudio);
            gainNode = audioCtx.createGain();
            gainNode.gain.value = 1.0; 
            
            source.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            // silenceVideo() logic
            video.volume = 0;
            video.muted = true;
        } catch(e) {
            console.error("GainNode setup failed", e);
        }
    }

    function selectAudioTrack(streamIndex, origin) {
        // Play fetched '/audio/{stream_index}/' paths
        const audioUrl = `${origin}/audio/${streamIndex}/`;
        const wasPaused = video.paused;
        const currentTime = video.currentTime;
        
        myAudio.src = audioUrl;
        myAudio.currentTime = currentTime;
        
        if (!wasPaused) {
            video.play();
            myAudio.play().catch(e => console.log("Audio autoplay blocked"));
        }
    }

    // Synchronization logic
    video.addEventListener('play', () => {
        if (isAudioEngineActive) {
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            myAudio.play().catch(e => console.log("Audio play blocked"));
        }
    });
    
    video.addEventListener('pause', () => {
        if (isAudioEngineActive) myAudio.pause();
    });
    
    video.addEventListener('seeking', () => {
        if (isAudioEngineActive) myAudio.currentTime = video.currentTime;
    });
    
    video.addEventListener('seeked', () => {
        if (isAudioEngineActive) myAudio.currentTime = video.currentTime;
    });
    
    video.addEventListener('timeupdate', () => {
        if (isAudioEngineActive && Math.abs(myAudio.currentTime - video.currentTime) > 0.5) {
            myAudio.currentTime = video.currentTime;
        }
    });

    // -----------------------------------------------------
    // 3. SECURITY MODULE (ANTI-PIRACY)
    // -----------------------------------------------------
    
    // Block Right Click
    document.addEventListener('contextmenu', e => {
        e.preventDefault();
        showOverlay('⚠️ Restricted');
    });

    // Block Keyboard Shortcuts (F12, Ctrl+U, Inspect)
    document.addEventListener('keydown', (e) => {
        if (e.key === 'F12' || 
           (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) || 
           (e.ctrlKey && (e.key === 'U' || e.key === 'S'))) {
            e.preventDefault();
            showOverlay('⚠️ Action Blocked');
            return false;
        }
    });

    // Anti-Debugger Trap (Freezes DevTools)
    setInterval(() => {
        const start = performance.now();
        debugger; 
        const end = performance.now();
        if (end - start > 100) {
            video.pause();
            document.body.innerHTML = "<h2 style='color:red; text-align:center; margin-top:50px;'>Security Threat Detected. Connection Closed.</h2>";
        }
    }, 2000);

    // Custom Watermark Engine handles positioning above

    // -----------------------------------------------------
    // 3. PLAYER CONTROLS & LOGIC
    // -----------------------------------------------------
    let isLocked = false;
    let hideTimer;

    function formatTime(sec) {
        if(isNaN(sec)) return "00:00:00";
        let h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60), s = Math.floor(sec%60);
        return (h<10?"0"+h:h)+":"+(m<10?"0"+m:m)+":"+(s<10?"0"+s:s);
    }

    function showOverlay(html) {
        overlay.innerHTML = html;
        overlay.style.display = 'flex';
        clearTimeout(window.ovTimer);
        window.ovTimer = setTimeout(() => overlay.style.display = 'none', 800);
    }

    function updateProgressBar() {
        const duration = video.duration;
        document.getElementById('currentTimeDisplay').innerText = formatTime(video.currentTime);
        document.getElementById('totalTimeDisplay').innerText = formatTime(duration);
        
        const progressBar = document.getElementById('progressBar');
        const sliderProgress = document.getElementById('sliderProgress');
        
        if (!duration || isNaN(duration) || duration === 0 || !isFinite(duration)) {
            progressBar.value = 0;
            sliderProgress.style.width = '0%';
        } else {
            const percent = (video.currentTime / duration) * 100;
            progressBar.value = percent;
            sliderProgress.style.width = percent + '%';
        }
    }

    video.addEventListener('timeupdate', updateProgressBar);
    video.addEventListener('loadedmetadata', updateProgressBar);

    video.addEventListener('progress', () => {
        if (video.buffered.length > 0) {
            let bufferEnd = video.buffered.end(video.buffered.length - 1);
            document.getElementById('bufferProgress').style.width = (bufferEnd / video.duration) * 100 + '%';
        }
        updateBufferText();
    });

    function updateBufferText() {
        if (loadingOverlay.style.display === 'flex' && video.buffered.length > 0) {
            let percent = (video.buffered.end(video.buffered.length - 1) / video.duration) * 100;
            document.getElementById('loadingText').innerText = 'Buffering... ' + Math.round(percent) + '%';
        }
    }

    video.addEventListener('progress', updateBufferText);

    video.addEventListener('waiting', () => { 
        loadingOverlay.style.display = 'flex'; 
        updateBufferText(); 
    });
    
    video.addEventListener('playing', () => loadingOverlay.style.display = 'none');
    video.addEventListener('play', () => document.getElementById('playBtn').innerHTML = '<i class="fas fa-pause"></i>');
    video.addEventListener('pause', () => document.getElementById('playBtn').innerHTML = '<i class="fas fa-play"></i>');

    document.getElementById('progressBar').addEventListener('input', function() {
        video.currentTime = (this.value / 100) * video.duration;
    });

    // Desktop Volume Slider binding
    document.getElementById('desktopVolume').addEventListener('input', function() {
        if (isAudioEngineActive) {
            if (gainNode) gainNode.gain.value = this.value;
            myAudio.muted = this.value === "0";
            document.getElementById('muteIcon').className = this.value === "0" ? "fas fa-volume-mute" : "fas fa-volume-up";
            showOverlay((this.value === "0" ? '<i class="fas fa-volume-mute"></i>' : '<i class="fas fa-volume-up"></i>') + ' Volume: ' + Math.round(this.value * 100) + '%');
        } else {
            video.volume = this.value;
            document.getElementById('muteIcon').className = video.volume === 0 ? "fas fa-volume-mute" : "fas fa-volume-up";
            showOverlay((video.volume === 0 ? '<i class="fas fa-volume-mute"></i>' : '<i class="fas fa-volume-up"></i>') + ' Volume: ' + Math.round(video.volume * 100) + '%');
        }
    });

    // VLC Keyboard Shortcuts
    document.addEventListener('keydown', (e) => {
        if (isLocked) return;
        // Ignore keydowns in input fields
        if(e.target.tagName === 'INPUT') return;
        
        switch(e.code) {
            case 'Space':
                e.preventDefault();
                togglePlay();
                break;
            case 'KeyF':
                e.preventDefault();
                handleFullscreenClick();
                break;
            case 'KeyM':
                e.preventDefault();
                toggleMute();
                break;
            case 'ArrowRight':
                e.preventDefault();
                video.currentTime += 10;
                showOverlay('+10s <i class="fas fa-forward"></i>');
                break;
            case 'ArrowLeft':
                e.preventDefault();
                video.currentTime -= 10;
                showOverlay('<i class="fas fa-backward"></i> -10s');
                break;
            case 'ArrowUp':
                e.preventDefault();
                if (isAudioEngineActive) {
                    let newVol = Math.min(1, parseFloat(document.getElementById('desktopVolume').value) + 0.1);
                    document.getElementById('desktopVolume').value = newVol;
                    if (gainNode) gainNode.gain.value = newVol;
                    myAudio.muted = newVol === 0;
                    showOverlay('<i class="fas fa-volume-up"></i> Volume: ' + Math.round(newVol * 100) + '%');
                } else {
                    video.volume = Math.min(1, video.volume + 0.1);
                    document.getElementById('desktopVolume').value = video.volume;
                    showOverlay('<i class="fas fa-volume-up"></i> Volume: ' + Math.round(video.volume * 100) + '%');
                }
                break;
            case 'ArrowDown':
                e.preventDefault();
                if (isAudioEngineActive) {
                    let newVol = Math.max(0, parseFloat(document.getElementById('desktopVolume').value) - 0.1);
                    document.getElementById('desktopVolume').value = newVol;
                    if (gainNode) gainNode.gain.value = newVol;
                    myAudio.muted = newVol === 0;
                    showOverlay((newVol === 0 ? '<i class="fas fa-volume-mute"></i>' : '<i class="fas fa-volume-down"></i>') + ' Volume: ' + Math.round(newVol * 100) + '%');
                } else {
                    video.volume = Math.max(0, video.volume - 0.1);
                    document.getElementById('desktopVolume').value = video.volume;
                    showOverlay((video.volume === 0 ? '<i class="fas fa-volume-mute"></i>' : '<i class="fas fa-volume-down"></i>') + ' Volume: ' + Math.round(video.volume * 100) + '%');
                }
                break;
        }
    });

    function triggerCenterIcon(iconClass) {
        centerIcon.innerHTML = `<i class="${iconClass}"></i>`;
        centerIcon.classList.add('active');
        clearTimeout(window.centerIconTimer);
        window.centerIconTimer = setTimeout(() => {
            centerIcon.classList.remove('active');
        }, 500);
    }

    function togglePlay() {
        if(video.paused) { 
            video.play(); 
            triggerCenterIcon('fas fa-play');
        } else { 
            video.pause(); 
            triggerCenterIcon('fas fa-pause');
        }
    }

    function toggleMute() {
        if (isAudioEngineActive) {
            myAudio.muted = !myAudio.muted;
            document.getElementById('muteIcon').className = myAudio.muted ? "fas fa-volume-mute" : "fas fa-volume-up";
            showOverlay(myAudio.muted ? '<i class="fas fa-volume-mute"></i> Muted' : '<i class="fas fa-volume-up"></i> Unmuted');
        } else {
            video.muted = !video.muted;
            document.getElementById('muteIcon').className = video.muted ? "fas fa-volume-mute" : "fas fa-volume-up";
            showOverlay(video.muted ? '<i class="fas fa-volume-mute"></i> Muted' : '<i class="fas fa-volume-up"></i> Unmuted');
        }
    }

    const speedPopup = document.getElementById('speedPopup');
    const speedSlider = document.getElementById('speedSlider');
    const speedInput = document.getElementById('speedInput');
    const qualityPopup = document.getElementById('qualityPopup');

    function toggleQualityPopup() {
        qualityPopup.style.display = qualityPopup.style.display === 'flex' ? 'none' : 'flex';
    }

    function changeQuality(obfuscatedUrl) {
        let currTime = video.currentTime;
        let wasPaused = video.paused;
        video.src = deobfuscateUrl(obfuscatedUrl);
        video.load();
        video.currentTime = currTime;
        if (!wasPaused) video.play().catch(e => console.log('Autoplay blocked'));
        setTimeout(() => { video.removeAttribute('src'); }, 1000);
        showOverlay('<i class="fas fa-check-circle text-green-500"></i> Quality Changed');
    }

    function toggleSpeedPopup() {
        speedPopup.style.display = speedPopup.style.display === 'flex' ? 'none' : 'flex';
        if (speedPopup.style.display === 'flex') {
            speedSlider.value = video.playbackRate;
            speedInput.value = video.playbackRate;
        }
    }

    function syncSpeedInputs(val) {
        speedSlider.value = val;
        speedInput.value = val;
    }

    speedSlider.addEventListener('input', (e) => syncSpeedInputs(e.target.value));
    speedInput.addEventListener('change', (e) => syncSpeedInputs(e.target.value));

    function applySpeedAndClose() {
        let next = parseFloat(speedSlider.value);
        if (!isNaN(next) && next > 0) {
            video.playbackRate = next;
            showOverlay('<i class="fas fa-tachometer-alt"></i> ' + next.toFixed(2) + 'x');
        }
        toggleSpeedPopup();
    }

    function cycleAspect() {
        const modes = ['contain', 'cover', 'fill'];
        let idx = (modes.indexOf(video.style.objectFit || 'contain') + 1) % 3;
        video.style.objectFit = modes[idx];
        showOverlay('<i class="fas fa-crop-alt"></i> Format Changed');
    }

    const orientationPopup = document.getElementById('orientationPopup');

    function handleFullscreenClick() {
        if (!document.fullscreenElement) { 
            if(window.innerWidth > 768) {
                vWrapper.requestFullscreen(); 
            } else {
                orientationPopup.style.display = 'flex';
            }
        } else { 
            document.exitFullscreen(); 
        }
    }

    async function enterFullScreen(o) { 
        orientationPopup.style.display = 'none'; 
        if (vWrapper.requestFullscreen) {
            await vWrapper.requestFullscreen(); 
        }
        if (screen.orientation && screen.orientation.lock) {
            await screen.orientation.lock(o).catch(e => console.log("Orientation lock failed:", e));
        } 
    }

    const handleFullscreenExit = () => {
        const isFullscreen = document.fullscreenElement || document.webkitFullscreenElement;
        const lBtn = document.getElementById('lockBtn');
        const epBtn = document.getElementById('episodesBtn');
        
        if (isFullscreen) {
            lBtn.classList.remove('hidden');
            if (epBtn && window.episodesData && window.episodesData.length > 0) {
                epBtn.classList.remove('hidden');
            }
        } else {
            lBtn.classList.add('hidden');
            if (epBtn) epBtn.classList.add('hidden');
            const drawer = document.getElementById('episodeDrawer');
            if (drawer) drawer.classList.add('hidden');
            
            if (screen.orientation && screen.orientation.unlock) {
                screen.orientation.unlock();
            }
            if (isLocked) {
                isLocked = false;
                lBtn.innerHTML = '<i class="fas fa-lock-open"></i>';
                customControls.style.opacity = '1';
                customControls.style.pointerEvents = 'auto';
                showOverlay('<i class="fas fa-lock-open"></i> Unlocked');
            }
        }
    };

    document.addEventListener('fullscreenchange', handleFullscreenExit);
    document.addEventListener('webkitfullscreenchange', handleFullscreenExit);

    function hideOrientationPopup() { 
        orientationPopup.style.display = 'none'; 
    }

    async function togglePiP() {
        if (document.pictureInPictureElement) {
            await document.exitPictureInPicture();
        } else if (document.pictureInPictureEnabled && !video.disablePictureInPicture) {
            await video.requestPictureInPicture().catch(e => console.error("PiP failed", e));
        }
    }

    function toggleLock(e) {
        e.stopPropagation();
        isLocked = !isLocked;
        lockBtn.innerHTML = isLocked ? '<i class="fas fa-lock" style="color:#ff2e7a"></i>' : '<i class="fas fa-lock-open"></i>';
        customControls.style.opacity = isLocked ? '0' : '1';
        customControls.style.pointerEvents = isLocked ? 'none' : 'auto';
        showOverlay(isLocked ? '<i class="fas fa-lock"></i> Locked' : '<i class="fas fa-lock-open"></i> Unlocked');
    }

    // Auto-Hide Controls
    glassOverlay.addEventListener('mousemove', resetHideTimer);
    glassOverlay.addEventListener('touchstart', resetHideTimer);
    function resetHideTimer() {
        document.getElementById('vWrapper').classList.remove('cursor-hidden');
        if (isLocked) {
            lockBtn.style.opacity = '1';
            lockBtn.style.pointerEvents = 'auto';
            clearTimeout(window.lockHideTimer);
            window.lockHideTimer = setTimeout(() => {
                if(!video.paused) {
                    lockBtn.style.opacity = '0';
                    lockBtn.style.pointerEvents = 'none';
                    document.getElementById('vWrapper').classList.add('cursor-hidden');
                }
            }, 3000);
            return;
        }
        customControls.style.opacity = '1';
        customControls.style.pointerEvents = 'auto';
        lockBtn.style.opacity = '1';
        lockBtn.style.pointerEvents = 'auto';
        clearTimeout(hideTimer);
        hideTimer = setTimeout(() => {
            if(!video.paused) { 
                customControls.style.opacity = '0'; 
                customControls.style.pointerEvents = 'none';
                lockBtn.style.opacity = '0'; 
                lockBtn.style.pointerEvents = 'none';
                document.getElementById('vWrapper').classList.add('cursor-hidden');
            }
        }, 3000);
    }

    // Double Tap to Seek
    let tapCount = 0, tapTimer;
    glassOverlay.addEventListener('click', (e) => {
        if(isLocked) {
            resetHideTimer();
            return;
        }
        tapCount++;
        if(tapCount === 1) {
            tapTimer = setTimeout(() => { tapCount = 0; togglePlay(); }, 250);
        } else if(tapCount === 2) {
            clearTimeout(tapTimer);
            let rect = glassOverlay.getBoundingClientRect();
            if(e.clientX - rect.left < rect.width / 2) { video.currentTime -= 10; showOverlay('<i class="fas fa-backward"></i> -10s'); }
            else { video.currentTime += 10; showOverlay('+10s <i class="fas fa-forward"></i>'); }
            tapCount = 0;
        }
    });

    // Mobile Swipe Gestures
    const brightnessOverlay = document.getElementById('brightnessOverlay');
    let touchStartX = 0, touchStartY = 0;
    let currentBrightness = 0; 
    let currentVolume = 1;
    let isDragging = false;
    let dragType = null; 

    glassOverlay.addEventListener('touchstart', (e) => {
        if(isLocked) return;
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
        currentVolume = video.volume;
        currentBrightness = parseFloat(brightnessOverlay.style.opacity) || 0;
        isDragging = true;
        dragType = null;
        
        if (touchStartY > window.innerHeight * 0.70 && window.episodesData && window.episodesData.length > 0) {
            dragType = 'drawer_pending';
        }
    });

    glassOverlay.addEventListener('touchmove', (e) => {
        if(!isDragging || isLocked) return;
        let x = e.touches[0].clientX;
        let y = e.touches[0].clientY;
        let dx = x - touchStartX;
        let dy = y - touchStartY;
        
        if (dragType === 'drawer_pending') {
            if (dy < -50) {
                e.preventDefault();
                openEpisodeDrawer();
                isDragging = false;
            } else if (Math.abs(dx) > 10 || dy > 10) {
                dragType = null;
            }
            return;
        }

        if (!dragType) {
            if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 10) dragType = 'seek';
            else if (Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 10) {
                let rect = glassOverlay.getBoundingClientRect();
                dragType = (touchStartX < rect.left + rect.width / 2) ? 'brightness' : 'volume';
            }
        }

        if (dragType === 'seek') {
            e.preventDefault(); 
            let seekSecs = Math.floor(dx / 8); 
            if (seekSecs !== 0) showOverlay((seekSecs > 0 ? `+${seekSecs}s <i class="fas fa-forward"></i>` : `<i class="fas fa-backward"></i> ${seekSecs}s`));
        } else if (dragType === 'brightness') {
            e.preventDefault();
            let newOpacity = currentBrightness + (dy / 300);
            newOpacity = Math.max(0, Math.min(0.8, newOpacity));
            brightnessOverlay.style.opacity = newOpacity;
            showOverlay('<i class="fas fa-sun"></i> Brightness: ' + Math.round((1 - newOpacity/0.8) * 100) + '%');
        } else if (dragType === 'volume') {
            e.preventDefault();
            let newVol = currentVolume - (dy / 300);
            newVol = Math.max(0, Math.min(1, newVol));
            video.volume = newVol;
            document.getElementById('desktopVolume').value = newVol;
            showOverlay((newVol === 0 ? '<i class="fas fa-volume-mute"></i>' : '<i class="fas fa-volume-up"></i>') + ' Volume: ' + Math.round(newVol * 100) + '%');
        }
    });

    glassOverlay.addEventListener('touchend', (e) => {
        if (!isDragging || isLocked) return;
        isDragging = false;
        if (dragType === 'seek') {
            let dx = e.changedTouches[0].clientX - touchStartX;
            let seekSecs = Math.floor(dx / 8);
            if(Math.abs(seekSecs) > 1) video.currentTime += seekSecs;
        }
        dragType = null;
    });

</script>
</body>
</html>
