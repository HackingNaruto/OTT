<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Secure Player</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; outline: none; }
body { font-family: 'Poppins', sans-serif; background: #000; height: 100vh; width: 100vw; margin: 0; padding: 0; display: flex; align-items: center; justify-content: center; user-select: none; -webkit-user-select: none; color: #fff; overflow: hidden; }
.main-wrapper { width: 100%; height: 100%; display: flex; flex-direction: column; }

.video-wrapper { position: relative; width: 100%; height: 100%; overflow: hidden; background: #000; display: flex; flex-direction: column; justify-content: center; }
.video-wrapper:fullscreen { aspect-ratio: auto; height: 100vh; border-radius: 0; }
video { width: 100%; height: 100%; display: block; object-fit: contain; pointer-events: none; }
.glass-overlay { position: absolute; top:0; left:0; width:100%; height:100%; z-index: 5; user-select: none; -webkit-touch-callout: none; pointer-events: auto; }

/* Overlays & Controls */
.lock-btn { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.6); color: white; border: none; border-radius: 50%; width: 40px; height: 40px; font-size: 16px; cursor: pointer; z-index: 25; display: flex; align-items: center; justify-content: center; }
.loading-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: none; flex-direction: column; align-items: center; gap: 8px; z-index: 15; }
.spinner { width: 45px; height: 45px; border: 4px solid rgba(255, 46, 122, 0.3); border-top: 4px solid #ff2e7a; border-radius: 50%; animation: spin 1s linear infinite; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

.gesture-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(25, 25, 25, 0.7); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); padding: 15px 25px; border-radius: 50px; font-size: 16px; font-weight: bold; display: none; z-index: 10; pointer-events: none; box-shadow: 0 4px 15px rgba(0,0,0,0.5); align-items: center; justify-content: center; gap: 10px; white-space: nowrap; }
.center-icon { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.5); background: rgba(0, 0, 0, 0.6); color: white; border-radius: 50%; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; font-size: 24px; opacity: 0; pointer-events: none; z-index: 30; transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.2s; }
.center-icon.active { opacity: 1; transform: translate(-50%, -50%) scale(1.5); }
.custom-controls { position: absolute; bottom: 0; left: 0; width: 100%; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); padding: 10px; display: flex; flex-direction: column; gap: 8px; transition: opacity 0.3s; z-index: 20; }
.progress-container { display: flex; align-items: center; gap: 8px; font-size: 11px; font-weight: 600; }
.slider-wrapper { position: relative; flex: 1; height: 16px; display: flex; align-items: center; cursor: pointer; }
.slider-track-bg { position: absolute; width: 100%; height: 3px; background: rgba(255,255,255,0.2); border-radius: 2px; }
.slider-progress { position: absolute; height: 3px; background: #ff2e7a; border-radius: 2px; width: 0%; pointer-events: none; }
.slider-wrapper input[type=range] { position: absolute; width: 100%; height: 100%; opacity: 0; cursor: pointer; z-index: 5; }

.control-buttons { display: flex; justify-content: space-between; align-items: center; }
.control-buttons button { background: none; border: none; color: white; font-size: 16px; cursor: pointer; margin-right: 15px; transition: color 0.2s; }
.control-buttons button:hover { color: #ff2e7a; }
.volume-container { display: flex; align-items: center; position: relative; }
.volume-slider { width: 0; opacity: 0; transition: width 0.3s, opacity 0.3s; margin-left: -5px; margin-right: 15px; accent-color: #ff2e7a; cursor: pointer; }
.volume-container:hover .volume-slider, .volume-slider:focus { width: 60px; opacity: 1; }

/* Dynamic Watermark */
#watermark { position: absolute; color: rgba(255, 255, 255, 0.12); font-size: 14px; font-weight: bold; pointer-events: none; z-index: 2147483647 !important; user-select: none; transition: all 1s ease; display: block !important; }
.popup { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.85); justify-content: center; align-items: center; z-index: 999999; }
.popup-content { background: #1a1a1a; padding: 25px; border-radius: 15px; width: 85%; max-width: 320px; text-align: center; border: 1px solid #333; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
.popup-content h2 { color: #ff2e7a; font-size: 18px; margin-bottom: 15px; }
.popup-content button { width: 100%; margin: 5px 0; padding: 10px; border-radius: 8px; border: none; outline: none; background: #2a2a2a; color: white; font-weight: bold; font-size: 14px; cursor: pointer; transition: 0.2s; }
.popup-content button:hover { border: 1px solid #ff2e7a; }
</style>
</head>
<body>

<div class="main-wrapper">
    <div class="video-wrapper" id="vWrapper">
        <div id="watermark">StreamX Protected</div>
        <button id="lockBtn" class="lock-btn" onclick="toggleLock(event)"><i class="fas fa-lock-open"></i></button>
        
        <div id="gestureOverlay" class="gesture-overlay"></div>
        <div id="centerIcon" class="center-icon"></div>
        <div id="loadingOverlay" class="loading-overlay">
            <div class="spinner"></div>
            <div id="loadingText" style="font-size:12px; margin-top:5px; font-weight:bold;">Buffering... 0%</div>
        </div>
        
        <!-- Anti Download attributes -->
        <video id="myVideo" playsinline controlsList="nodownload noplaybackrate"></video>
        <div id="brightnessOverlay" style="position: absolute; top:0; left:0; width:100%; height:100%; background: black; opacity: 0; pointer-events: none; z-index: 4; transition: opacity 0.1s;"></div>
        <div id="glassOverlay" class="glass-overlay"></div>

        <div class="custom-controls" id="customControls">
            <div class="progress-container">
                <span id="currentTimeDisplay">00:00:00</span>
                <div class="slider-wrapper">
                    <div class="slider-track-bg"></div>
                    <div class="slider-buffer" id="bufferProgress" style="position: absolute; height: 3px; background: rgba(255,255,255,0.4); border-radius: 2px; width: 0%; pointer-events: none;"></div>
                    <div class="slider-progress" id="sliderProgress" style="z-index: 2;"></div>
                    <input type="range" id="progressBar" min="0" max="100" value="0">
                </div>
                <span id="totalTimeDisplay">00:00:00</span>
            </div>
            <div class="control-buttons">
                <div style="display: flex; align-items: center;">
                    <button onclick="togglePlay()" id="playBtn"><i class="fas fa-play"></i></button>
                    <div class="volume-container">
                        <button onclick="toggleMute()"><i class="fas fa-volume-up" id="muteIcon"></i></button>
                        <input type="range" id="desktopVolume" class="volume-slider" min="0" max="1" step="0.05" value="1">
                    </div>
                    <button onclick="toggleSpeedPopup()" id="speedBtn" title="Playback Speed"><i class="fas fa-tachometer-alt"></i></button>
                </div>
                <div>
                    <button onclick="togglePiP()" title="Picture in Picture"><i class="fas fa-clone"></i></button>
                    <button onclick="cycleAspect()"><i class="fas fa-crop-alt"></i></button>
                    <button onclick="handleFullscreenClick()" style="margin-right: 0;"><i class="fas fa-expand"></i></button>
                </div>
            </div>
        </div>

        <div id="orientationPopup" class="popup" onclick="hideOrientationPopup()">
            <div class="popup-content" onclick="event.stopPropagation()">
                <h2>Screen Orientation</h2>
                <button onclick="enterFullScreen('landscape')"><i class="fas fa-mobile-alt" style="transform: rotate(90deg);"></i> Landscape</button>
                <button onclick="enterFullScreen('portrait')"><i class="fas fa-mobile-alt"></i> Portrait</button>
                <button style="background: #ff2e7a; margin-top: 8px;" onclick="hideOrientationPopup()">Cancel</button>
            </div>
        </div>

        <div id="speedPopup" class="popup" onclick="toggleSpeedPopup()">
            <div class="popup-content" style="max-width: 300px; padding: 20px;" onclick="event.stopPropagation()">
                <h2>Playback Speed</h2>
                <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px;">
                    <input type="range" id="speedSlider" min="0.25" max="3" step="0.25" value="1" style="flex: 1; margin-right: 15px; accent-color: #ff2e7a; cursor: pointer;">
                    <input type="number" id="speedInput" min="0.25" max="5" step="0.1" value="1" style="width: 60px; background: #2a2a2a; border: 1px solid #444; color: white; padding: 5px; border-radius: 5px; text-align: center; outline: none;">
                </div>
                <button style="background: #ff2e7a; margin-top: 5px;" onclick="toggleSpeedPopup()">Close</button>
            </div>
        </div>

        <div id="resumePopup" class="popup" style="background: rgba(0,0,0,0.9);">
            <div class="popup-content" style="background: transparent; border: none; box-shadow: none;">
                <h2 style="color: white; font-size: 24px; margin-bottom: 20px;">Resume Playback?</h2>
                <button onclick="resumePlayback(true)" style="background: white; color: black; padding: 15px; font-size: 16px; border-radius: 50px; margin-bottom: 15px; display: flex; justify-content: center; align-items: center; gap: 10px;"><i class="fas fa-play"></i> Resume Playing</button>
                <button onclick="resumePlayback(false)" style="background: rgba(255,255,255,0.2); color: white; padding: 15px; font-size: 16px; border-radius: 50px; display: flex; justify-content: center; align-items: center; gap: 10px;"><i class="fas fa-redo"></i> Start Over</button>
            </div>
        </div>
    </div>
</div>

<script>
    // -----------------------------------------------------
    // 1. INITIALIZATION & DYNAMIC URL FETCH
    // -----------------------------------------------------
    const params = new URLSearchParams(window.location.search);
    const videoId = params.get('id') || params.get('title');
    const videoUrl = params.get('url');
    const title = params.get('title') || 'External Stream';
    const wmText = params.get('wm_text') || '';
    const wmEnable = params.get('wm_enable') === 'true';
    const siteName = params.get('site_name') || 'StreamX';
    const wmMove = params.get('wm_move') || 'static';
    const wmSize = params.get('wm_size') || '14px';
    const wmPos = params.get('wm_pos') || 'bottom-right';
    
    const wmElement = document.getElementById('watermark');
    if (wmEnable && wmText) {
        wmElement.innerText = wmText;
        wmElement.style.fontSize = wmSize;
        wmElement.style.display = 'block';

        if (wmMove === 'static') {
            wmElement.style.top = 'auto';
            wmElement.style.bottom = 'auto';
            wmElement.style.left = 'auto';
            wmElement.style.right = 'auto';
            
            if (wmPos === 'bottom-right') { wmElement.style.bottom = '15px'; wmElement.style.right = '15px'; }
            else if (wmPos === 'bottom-left') { wmElement.style.bottom = '15px'; wmElement.style.left = '15px'; }
            else if (wmPos === 'top-right') { wmElement.style.top = '15px'; wmElement.style.right = '15px'; }
            else if (wmPos === 'top-left') { wmElement.style.top = '15px'; wmElement.style.left = '15px'; }
        } else {
            window.wmInterval = setInterval(() => {
                wmElement.style.top = Math.floor(Math.random() * 80) + '%';
                wmElement.style.left = Math.floor(Math.random() * 80) + '%';
            }, 12000);
        }
    } else {
        wmElement.style.display = 'none';
    }

    const video = document.getElementById('myVideo');
    const glassOverlay = document.getElementById('glassOverlay');
    const vWrapper = document.getElementById('vWrapper');
    const customControls = document.getElementById('customControls');
    const lockBtn = document.getElementById('lockBtn');
    const overlay = document.getElementById('gestureOverlay');
    const centerIcon = document.getElementById('centerIcon');
    const loadingOverlay = document.getElementById('loadingOverlay');

    const resumePopup = document.getElementById('resumePopup');
    let savedTime = 0;
    if (videoId) {
        savedTime = parseFloat(localStorage.getItem('resume_' + videoId)) || 0;
    }

    if (videoUrl) {
        video.src = videoUrl;
        video.load();
        
        if (savedTime > 5) {
            resumePopup.style.display = 'flex';
        } else {
            video.play().catch(e => console.log("Autoplay blocked"));
        }
        
        setTimeout(() => { video.removeAttribute('src'); }, 1000);
    }

    function resumePlayback(resume) {
        resumePopup.style.display = 'none';
        if (resume && savedTime > 0) {
            video.currentTime = savedTime;
        }
        video.play().catch(e => console.log("Autoplay blocked"));
    }

    // Save progress periodically
    setInterval(() => {
        if (!video.paused && video.currentTime > 5 && videoId) {
            localStorage.setItem('resume_' + videoId, video.currentTime);
        }
    }, 3000);

    // postMessage Listener for seamless quality hot-swap
    window.addEventListener('message', (e) => {
        if (e.data && e.data.type === 'switchQuality' && e.data.url) {
            let currTime = video.currentTime;
            let wasPaused = video.paused;
            video.src = e.data.url;
            video.currentTime = currTime;
            if (!wasPaused) video.play();
            setTimeout(() => { video.removeAttribute('src'); }, 1000);
            showOverlay('<i class="fas fa-check-circle text-green-500"></i> Quality Changed');
        }
    });

    // -----------------------------------------------------
    // 2. SECURITY MODULE (ANTI-PIRACY)
    // -----------------------------------------------------
    
    // Block Right Click
    document.addEventListener('contextmenu', e => {
        e.preventDefault();
        showOverlay('⚠️ Restricted');
    });

    // Block Keyboard Shortcuts (F12, Ctrl+U, Inspect)
    document.addEventListener('keydown', (e) => {
        if (e.key === 'F12' || 
           (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) || 
           (e.ctrlKey && (e.key === 'U' || e.key === 'S'))) {
            e.preventDefault();
            showOverlay('⚠️ Action Blocked');
            return false;
        }
    });

    // Anti-Debugger Trap (Freezes DevTools)
    setInterval(() => {
        const start = performance.now();
        debugger; 
        const end = performance.now();
        if (end - start > 100) {
            video.pause();
            document.body.innerHTML = "<h2 style='color:red; text-align:center; margin-top:50px;'>Security Threat Detected. Connection Closed.</h2>";
        }
    }, 2000);

    // Custom Watermark Engine handles positioning above

    // -----------------------------------------------------
    // 3. PLAYER CONTROLS & LOGIC
    // -----------------------------------------------------
    let isLocked = false;
    let hideTimer;

    function formatTime(sec) {
        if(isNaN(sec)) return "00:00:00";
        let h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60), s = Math.floor(sec%60);
        return (h<10?"0"+h:h)+":"+(m<10?"0"+m:m)+":"+(s<10?"0"+s:s);
    }

    function showOverlay(html) {
        overlay.innerHTML = html;
        overlay.style.display = 'flex';
        clearTimeout(window.ovTimer);
        window.ovTimer = setTimeout(() => overlay.style.display = 'none', 800);
    }

    video.addEventListener('timeupdate', () => {
        document.getElementById('currentTimeDisplay').innerText = formatTime(video.currentTime);
        document.getElementById('totalTimeDisplay').innerText = formatTime(video.duration);
        let pc = (video.currentTime / video.duration) * 100;
        document.getElementById('sliderProgress').style.width = pc + '%';
        document.getElementById('progressBar').value = pc;
        
        // Update secondary buffer progress bar
        if (video.buffered.length > 0) {
            let bufferEnd = video.buffered.end(video.buffered.length - 1);
            document.getElementById('bufferProgress').style.width = (bufferEnd / video.duration) * 100 + '%';
        }
    });

    function updateBufferText() {
        if (loadingOverlay.style.display === 'flex' && video.buffered.length > 0) {
            let percent = (video.buffered.end(video.buffered.length - 1) / video.duration) * 100;
            document.getElementById('loadingText').innerText = 'Buffering... ' + Math.round(percent) + '%';
        }
    }

    video.addEventListener('progress', updateBufferText);

    video.addEventListener('waiting', () => { 
        loadingOverlay.style.display = 'flex'; 
        updateBufferText(); 
    });
    
    video.addEventListener('playing', () => loadingOverlay.style.display = 'none');

    document.getElementById('progressBar').addEventListener('input', function() {
        video.currentTime = (this.value / 100) * video.duration;
    });

    // Desktop Volume Slider binding
    document.getElementById('desktopVolume').addEventListener('input', function() {
        video.volume = this.value;
        document.getElementById('muteIcon').className = video.volume === 0 ? "fas fa-volume-mute" : "fas fa-volume-up";
        showOverlay((video.volume === 0 ? '<i class="fas fa-volume-mute"></i>' : '<i class="fas fa-volume-up"></i>') + ' Volume: ' + Math.round(video.volume * 100) + '%');
    });

    // VLC Keyboard Shortcuts
    document.addEventListener('keydown', (e) => {
        if (isLocked) return;
        // Ignore keydowns in input fields
        if(e.target.tagName === 'INPUT') return;
        
        switch(e.code) {
            case 'Space':
                e.preventDefault();
                togglePlay();
                break;
            case 'KeyF':
                e.preventDefault();
                handleFullscreenClick();
                break;
            case 'KeyM':
                e.preventDefault();
                toggleMute();
                break;
            case 'ArrowRight':
                e.preventDefault();
                video.currentTime += 10;
                showOverlay('+10s <i class="fas fa-forward"></i>');
                break;
            case 'ArrowLeft':
                e.preventDefault();
                video.currentTime -= 10;
                showOverlay('<i class="fas fa-backward"></i> -10s');
                break;
            case 'ArrowUp':
                e.preventDefault();
                video.volume = Math.min(1, video.volume + 0.1);
                document.getElementById('desktopVolume').value = video.volume;
                showOverlay('<i class="fas fa-volume-up"></i> Volume: ' + Math.round(video.volume * 100) + '%');
                break;
            case 'ArrowDown':
                e.preventDefault();
                video.volume = Math.max(0, video.volume - 0.1);
                document.getElementById('desktopVolume').value = video.volume;
                showOverlay((video.volume === 0 ? '<i class="fas fa-volume-mute"></i>' : '<i class="fas fa-volume-down"></i>') + ' Volume: ' + Math.round(video.volume * 100) + '%');
                break;
        }
    });

    function triggerCenterIcon(iconClass) {
        centerIcon.innerHTML = `<i class="${iconClass}"></i>`;
        centerIcon.classList.add('active');
        clearTimeout(window.centerIconTimer);
        window.centerIconTimer = setTimeout(() => {
            centerIcon.classList.remove('active');
        }, 500);
    }

    function togglePlay() {
        if(video.paused) { 
            video.play(); 
            document.getElementById('playBtn').innerHTML = '<i class="fas fa-pause"></i>';
            triggerCenterIcon('fas fa-play');
        } else { 
            video.pause(); 
            document.getElementById('playBtn').innerHTML = '<i class="fas fa-play"></i>';
            triggerCenterIcon('fas fa-pause');
        }
    }

    function toggleMute() {
        video.muted = !video.muted;
        document.getElementById('muteIcon').className = video.muted ? "fas fa-volume-mute" : "fas fa-volume-up";
        showOverlay(video.muted ? '<i class="fas fa-volume-mute"></i> Muted' : '<i class="fas fa-volume-up"></i> Unmuted');
    }

    const speedPopup = document.getElementById('speedPopup');
    const speedSlider = document.getElementById('speedSlider');
    const speedInput = document.getElementById('speedInput');

    function toggleSpeedPopup() {
        speedPopup.style.display = speedPopup.style.display === 'flex' ? 'none' : 'flex';
        if (speedPopup.style.display === 'flex') {
            speedSlider.value = video.playbackRate;
            speedInput.value = video.playbackRate;
        }
    }

    function setSpeed(val) {
        let next = parseFloat(val);
        if (isNaN(next) || next <= 0) return;
        video.playbackRate = next;
        speedSlider.value = next;
        speedInput.value = next;
        showOverlay('<i class="fas fa-tachometer-alt"></i> ' + next + 'x');
    }

    speedSlider.addEventListener('input', (e) => setSpeed(e.target.value));
    speedInput.addEventListener('change', (e) => setSpeed(e.target.value));

    function cycleAspect() {
        const modes = ['contain', 'cover', 'fill'];
        let idx = (modes.indexOf(video.style.objectFit || 'contain') + 1) % 3;
        video.style.objectFit = modes[idx];
        showOverlay('<i class="fas fa-crop-alt"></i> Format Changed');
    }

    const orientationPopup = document.getElementById('orientationPopup');

    function handleFullscreenClick() {
        if (!document.fullscreenElement) { 
            if(window.innerWidth > 768) {
                vWrapper.requestFullscreen(); 
            } else {
                orientationPopup.style.display = 'flex';
            }
        } else { 
            document.exitFullscreen(); 
        }
    }

    async function enterFullScreen(o) { 
        orientationPopup.style.display = 'none'; 
        if (vWrapper.requestFullscreen) {
            await vWrapper.requestFullscreen(); 
        }
        if (screen.orientation && screen.orientation.lock) {
            await screen.orientation.lock(o).catch(e => console.log("Orientation lock failed:", e));
        } 
    }

    function hideOrientationPopup() { 
        orientationPopup.style.display = 'none'; 
    }

    async function togglePiP() {
        if (document.pictureInPictureElement) {
            await document.exitPictureInPicture();
        } else if (document.pictureInPictureEnabled && !video.disablePictureInPicture) {
            await video.requestPictureInPicture().catch(e => console.error("PiP failed", e));
        }
    }

    function toggleLock(e) {
        e.stopPropagation();
        isLocked = !isLocked;
        lockBtn.innerHTML = isLocked ? '<i class="fas fa-lock" style="color:#ff2e7a"></i>' : '<i class="fas fa-lock-open"></i>';
        customControls.style.opacity = isLocked ? '0' : '1';
        customControls.style.pointerEvents = isLocked ? 'none' : 'auto';
        showOverlay(isLocked ? '<i class="fas fa-lock"></i> Locked' : '<i class="fas fa-lock-open"></i> Unlocked');
    }

    // Auto-Hide Controls
    glassOverlay.addEventListener('mousemove', resetHideTimer);
    glassOverlay.addEventListener('touchstart', resetHideTimer);
    function resetHideTimer() {
        if (isLocked) {
            lockBtn.style.opacity = '1';
            lockBtn.style.pointerEvents = 'auto';
            clearTimeout(window.lockHideTimer);
            window.lockHideTimer = setTimeout(() => {
                lockBtn.style.opacity = '0';
                lockBtn.style.pointerEvents = 'none';
            }, 3000);
            return;
        }
        customControls.style.opacity = '1';
        customControls.style.pointerEvents = 'auto';
        lockBtn.style.opacity = '1';
        lockBtn.style.pointerEvents = 'auto';
        clearTimeout(hideTimer);
        hideTimer = setTimeout(() => {
            if(!video.paused) { 
                customControls.style.opacity = '0'; 
                customControls.style.pointerEvents = 'none';
                lockBtn.style.opacity = '0'; 
                lockBtn.style.pointerEvents = 'none';
            }
        }, 3000);
    }

    // Double Tap to Seek
    let tapCount = 0, tapTimer;
    glassOverlay.addEventListener('click', (e) => {
        if(isLocked) {
            resetHideTimer();
            return;
        }
        tapCount++;
        if(tapCount === 1) {
            tapTimer = setTimeout(() => { tapCount = 0; togglePlay(); }, 250);
        } else if(tapCount === 2) {
            clearTimeout(tapTimer);
            let rect = glassOverlay.getBoundingClientRect();
            if(e.clientX - rect.left < rect.width / 2) { video.currentTime -= 10; showOverlay('<i class="fas fa-backward"></i> -10s'); }
            else { video.currentTime += 10; showOverlay('+10s <i class="fas fa-forward"></i>'); }
            tapCount = 0;
        }
    });

    // Mobile Swipe Gestures
    const brightnessOverlay = document.getElementById('brightnessOverlay');
    let touchStartX = 0, touchStartY = 0;
    let currentBrightness = 0; 
    let currentVolume = 1;
    let isDragging = false;
    let dragType = null; 

    glassOverlay.addEventListener('touchstart', (e) => {
        if(isLocked) return;
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
        currentVolume = video.volume;
        currentBrightness = parseFloat(brightnessOverlay.style.opacity) || 0;
        isDragging = true;
        dragType = null;
    });

    glassOverlay.addEventListener('touchmove', (e) => {
        if(!isDragging || isLocked) return;
        let x = e.touches[0].clientX;
        let y = e.touches[0].clientY;
        let dx = x - touchStartX;
        let dy = y - touchStartY;
        
        if (!dragType) {
            if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 10) dragType = 'seek';
            else if (Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 10) {
                let rect = glassOverlay.getBoundingClientRect();
                dragType = (touchStartX < rect.left + rect.width / 2) ? 'brightness' : 'volume';
            }
        }

        if (dragType === 'seek') {
            e.preventDefault(); 
            let seekSecs = Math.floor(dx / 8); 
            if (seekSecs !== 0) showOverlay((seekSecs > 0 ? `+${seekSecs}s <i class="fas fa-forward"></i>` : `<i class="fas fa-backward"></i> ${seekSecs}s`));
        } else if (dragType === 'brightness') {
            e.preventDefault();
            let newOpacity = currentBrightness + (dy / 300);
            newOpacity = Math.max(0, Math.min(0.8, newOpacity));
            brightnessOverlay.style.opacity = newOpacity;
            showOverlay('<i class="fas fa-sun"></i> Brightness: ' + Math.round((1 - newOpacity/0.8) * 100) + '%');
        } else if (dragType === 'volume') {
            e.preventDefault();
            let newVol = currentVolume - (dy / 300);
            newVol = Math.max(0, Math.min(1, newVol));
            video.volume = newVol;
            document.getElementById('desktopVolume').value = newVol;
            showOverlay((newVol === 0 ? '<i class="fas fa-volume-mute"></i>' : '<i class="fas fa-volume-up"></i>') + ' Volume: ' + Math.round(newVol * 100) + '%');
        }
    });

    glassOverlay.addEventListener('touchend', (e) => {
        if (!isDragging || isLocked) return;
        isDragging = false;
        if (dragType === 'seek') {
            let dx = e.changedTouches[0].clientX - touchStartX;
            let seekSecs = Math.floor(dx / 8);
            if(Math.abs(seekSecs) > 1) video.currentTime += seekSecs;
        }
        dragType = null;
    });

</script>
</body>
</html>
